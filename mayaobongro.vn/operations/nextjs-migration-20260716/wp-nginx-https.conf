server {
    listen 80;
    listen [::]:80;
    server_name wp.mayaobongro.vn;

    root /var/www/wp.mayaobongro.vn;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wp.mayaobongro.vn;

    root /var/www/wp.mayaobongro.vn;
    index index.php;
    client_max_body_size 32M;

    ssl_certificate /etc/letsencrypt/live/wp.mayaobongro.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wp.mayaobongro.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/wp.mayaobongro.vn_access.log;
    error_log /var/log/nginx/wp.mayaobongro.vn_error.log;

    auth_basic "WordPress archive";
    auth_basic_user_file /etc/nginx/.htpasswd-mayaobongro-wp;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /xmlrpc.php {
        return 403;
    }

    location ~* ^/(?:wp-content/)?(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-mayaobongro.sock;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    location ~ /\. {
        deny all;
    }
}
