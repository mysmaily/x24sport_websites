[mayaobongro-wp-archive]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-mayaobongro.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 8
pm.process_idle_timeout = 15s
pm.max_requests = 500

php_admin_value[upload_tmp_dir] = /var/www/wp.mayaobongro.vn/wp-content/uploads
php_admin_value[open_basedir] = /var/www/wp.mayaobongro.vn:/tmp:/etc/mayaobongro-wp
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 32M
php_admin_value[post_max_size] = 32M
php_admin_value[max_execution_time] = 120
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php8.3-fpm-mayaobongro.log

catch_workers_output = yes
clear_env = yes
