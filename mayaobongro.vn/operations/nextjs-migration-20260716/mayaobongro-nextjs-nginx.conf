upstream mayaobongro_nextjs {
    server 10.10.0.28:3005;
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name mayaobongro.vn;

    client_max_body_size 32M;
    access_log /var/log/nginx/mayaobongro.vn_access.log;
    error_log /var/log/nginx/mayaobongro.vn_error.log;

    # Keep every historical media URL available while WordPress remains private.
    location /wp-content/uploads/ {
        alias /var/www/wp.mayaobongro.vn/wp-content/uploads/;
        error_page 404 = @legacy_media_cdn;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location @legacy_media_cdn {
        proxy_pass https://cdn.mayaobongro.vn;
        proxy_ssl_server_name on;
        proxy_ssl_name cdn.mayaobongro.vn;
        proxy_set_header Host cdn.mayaobongro.vn;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No WordPress execution or public administration remains on the apex domain.
    location ~* ^/wp-content/uploads/.*\.php(?:$|/) { return 404; }
    location ~* ^/(?:wp-admin|wp-json)(?:/|$) { return 404; }
    location = /wp-login.php { return 404; }
    location = /xmlrpc.php { return 404; }
    location = /wp-cron.php { return 404; }

    location ^~ /_next/static/ {
        proxy_pass http://mayaobongro_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://mayaobongro_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_buffer_size 64k;
    }

    ssl_certificate /etc/letsencrypt/live/mayaobongro.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mayaobongro.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name mayaobongro.vn;
    return 301 https://$host$request_uri;
}
