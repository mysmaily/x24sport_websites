fastcgi_cache_path /var/cache/nginx/mayaobongda.vn levels=1:2 keys_zone=mayaobongda_vn:100m inactive=60m max_size=1g;

server {
    listen 80;
    server_name mayaobongda.vn;

    root /var/www/mayaobongda.vn;
    index index.php index.html;

    # Open file cache for static assets (reduces disk I/O)
    open_file_cache max=2000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    set $skip_cache 0;

    # POST requests and urls with a query string should always go to PHP
    if ($request_method = POST) {
        set $skip_cache 1;
    }
    if ($query_string != "") {
        set $skip_cache 1;
    }

    # Don't cache uris containing the following segments
    if ($request_uri ~* "/wp-admin/|/wp-login.php|/cart/|/checkout/|/my-account/|/wc-api/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
        set $skip_cache 1;
    }

    # Don't use the cache for logged in users or recent commenters
    if ($http_cookie ~* "comment_author|wordpress_logged_in|wp-postpass|wordpress_no_cache|wordpress_test_cookie|woocommerce_items_in_cart|woocommerce_cart_hash|wp_woocommerce_session_") {
        set $skip_cache 1;
    }

    # Use X-Forwarded-For for real IP when behind proxy
    set_real_ip_from 10.10.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_cache mayaobongda_vn;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";

        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;

        fastcgi_cache_valid 200 301 302 60m;
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;
        fastcgi_cache_lock on;
        fastcgi_cache_revalidate on;
        fastcgi_cache_min_uses 2;
        fastcgi_cache_background_update on;
        fastcgi_keep_conn on;
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;

        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        add_header X-FastCGI-Cache $upstream_cache_status always;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|avif|css|js|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        log_not_found off;
    }
}
