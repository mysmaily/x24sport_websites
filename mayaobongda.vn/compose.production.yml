services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-mayaobongda
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3012
      PAYLOAD_API_URL: http://10.10.0.28:3001
      TENANT_SLUG: mayaobongda
    ports:
      - "3012:3012"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://'+process.env.HOSTNAME+':3012/robots.txt').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
