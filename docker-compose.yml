services:
  cms-api:
    build:
      context: ./cms-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${SPORTS_CMS_DB_USER}:${SPORTS_CMS_DB_PASSWORD}@${SPORTS_CMS_DB_HOST}:${SPORTS_CMS_DB_PORT}/${SPORTS_CMS_DB_NAME}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL:-https://static.x24sport.vn}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      GA4_REPORT_CRON: ${GA4_REPORT_CRON:-0 23 * * *}
      GA4_REPORT_RUN_ON_STARTUP: ${GA4_REPORT_RUN_ON_STARTUP:-false}
      GA4_REPORT_TIMEZONE: ${GA4_REPORT_TIMEZONE:-Asia/Ho_Chi_Minh}
      GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON: ${GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_ANALYTICS_SERVICE_ACCOUNT_PATH: ${GOOGLE_ANALYTICS_SERVICE_ACCOUNT_PATH:-}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PORT: 3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "3001:3001"

  cms-ga4-reporter:
    build:
      context: ./cms-api
    restart: unless-stopped
    depends_on:
      - cms-api
    command: ["pnpm", "ga4:report:scheduler"]
    environment:
      DATABASE_URL: postgres://${SPORTS_CMS_DB_USER}:${SPORTS_CMS_DB_PASSWORD}@${SPORTS_CMS_DB_HOST}:${SPORTS_CMS_DB_PORT}/${SPORTS_CMS_DB_NAME}
      GA4_REPORT_CRON: ${GA4_REPORT_CRON:-0 23 * * *}
      GA4_REPORT_RUN_ON_STARTUP: ${GA4_REPORT_RUN_ON_STARTUP:-false}
      GA4_REPORT_TIMEZONE: ${GA4_REPORT_TIMEZONE:-Asia/Ho_Chi_Minh}
      GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON: ${GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_ANALYTICS_SERVICE_ACCOUNT_PATH: ${GOOGLE_ANALYTICS_SERVICE_ACCOUNT_PATH:-}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PORT: 3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

  mayaocaulong:
    build:
      context: ./mayaocaulong.vn
    restart: unless-stopped
    depends_on:
      - cms-api
    environment:
      PAYLOAD_API_URL: http://cms-api:3001
      PORT: 3002
      TENANT_SLUG: mayaocaulong
    ports:
      - "3002:3002"

  mayaobongchuyen:
    build:
      context: ./mayaobongchuyen.vn
    restart: unless-stopped
    depends_on:
      - cms-api
    environment:
      PAYLOAD_API_URL: http://cms-api:3001
      PORT: 3003
      TENANT_SLUG: mayaobongchuyen
    ports:
      - "3003:3003"

  mayaobongro:
    build:
      context: ./mayaobongro.vn
    restart: unless-stopped
    depends_on:
      - cms-api
    environment:
      PAYLOAD_API_URL: http://cms-api:3001
      PORT: 3005
      TENANT_SLUG: mayaobongro
    ports:
      - "3005:3005"
